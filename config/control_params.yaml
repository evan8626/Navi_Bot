# Motion Control Parameters

# PID Controller Gains
pid_linear:
  kp: 0.5
  ki: 0.01
  kd: 0.1
  output_min: -1.0                 # m/s
  output_max: 1.0                  # m/s

pid_angular:
  kp: 2.0
  ki: 0.05
  kd: 0.2
  output_min: -2.0                 # rad/s
  output_max: 2.0                  # rad/s

# Goal tolerance
navigation:
  goal_distance_tolerance: 0.1     # meters
  goal_angle_tolerance: 0.087      # radians (~5 degrees)
  waypoint_tolerance: 0.2          # meters

# Path planning
planner:
  grid_resolution: 0.05            # meters per cell
  obstacle_inflation_radius: 0.3   # meters
  planning_timeout: 0.05           # seconds (50ms)
  replan_frequency: 2.0            # Hz

# Dynamic Window Approach
dwa:
  velocity_samples: 20
  angular_samples: 40
  time_horizon: 2.0                # seconds
  heading_weight: 1.0
  clearance_weight: 2.0
  velocity_weight: 0.5

# Real-time constraints
timing:
  control_loop_period: 0.02        # 20ms (50 Hz)
  sensor_processing_deadline: 0.01 # 10ms
  planning_deadline: 0.05          # 50ms